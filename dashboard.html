<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>ReadBooks</title>    
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="flex items-center justify-between">
        <h1 class="p-5 text-2xl text-[#006790] font-bold">ReadBooks</h1>
        <form onsubmit="getBooks(event)" class="bg-[#f5f5f5] p-2 rounded-md w-1/3 flex justify-between">
            <input class="w-full p-2" type="text" name="busca" id="busca-input" placeholder="Busca por livro, autor...">
            <button type="submit" class="pr-2"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        <span></span>
    </header>
    <main>
        <section id="resultado-pesquisa">
            <div>
                <img src="" alt="">
                <h2>${book.title}</h2>
                <h3>${book.author_name[0]}</h3>
                <button>+</button>
            </div></section>
        <section>
            <h1>Meta de Leitura</h1>
            <div></div>
        </section>
    </main>
    <script src="/dashboard.js"></script>
</body>
</html>
